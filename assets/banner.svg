<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8751a"/>
      <stop offset="100%" style="stop-color:#f59e0b"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="200" rx="12" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.04" stroke="#ffffff" stroke-width="0.5">
    <line x1="0" y1="40" x2="800" y2="40"/>
    <line x1="0" y1="80" x2="800" y2="80"/>
    <line x1="0" y1="120" x2="800" y2="120"/>
    <line x1="0" y1="160" x2="800" y2="160"/>
    <line x1="100" y1="0" x2="100" y2="200"/>
    <line x1="200" y1="0" x2="200" y2="200"/>
    <line x1="300" y1="0" x2="300" y2="200"/>
    <line x1="400" y1="0" x2="400" y2="200"/>
    <line x1="500" y1="0" x2="500" y2="200"/>
    <line x1="600" y1="0" x2="600" y2="200"/>
    <line x1="700" y1="0" x2="700" y2="200"/>
  </g>

  <!-- Icon: rounded square with V -->
  <rect x="60" y="50" width="100" height="100" rx="22" fill="url(#accent)"/>
  <text x="110" y="122" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="64" font-weight="700" fill="white" text-anchor="middle">V</text>

  <!-- Title -->
  <text x="190" y="112" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="52" font-weight="700" fill="white">VidFlow</text>

  <!-- Subtitle -->
  <text x="192" y="145" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="16" fill="#94a3b8" letter-spacing="0.5">Automated video generation with Google Flow</text>

  <!-- Pipeline visualization -->
  <g transform="translate(540, 72)" filter="url(#glow)">
    <!-- Image icon -->
    <rect x="0" y="0" width="44" height="44" rx="8" fill="none" stroke="#e8751a" stroke-width="1.5" opacity="0.8"/>
    <text x="22" y="28" font-family="system-ui" font-size="18" fill="#e8751a" text-anchor="middle" opacity="0.9">IMG</text>

    <!-- Arrow 1 -->
    <line x1="52" y1="22" x2="72" y2="22" stroke="#f59e0b" stroke-width="1.5" opacity="0.6"/>
    <polygon points="70,18 78,22 70,26" fill="#f59e0b" opacity="0.6"/>

    <!-- Video icon -->
    <rect x="82" y="0" width="44" height="44" rx="8" fill="none" stroke="#f59e0b" stroke-width="1.5" opacity="0.8"/>
    <polygon points="97,14 117,22 97,30" fill="#f59e0b" opacity="0.7"/>

    <!-- Arrow 2 -->
    <line x1="134" y1="22" x2="154" y2="22" stroke="#fbbf24" stroke-width="1.5" opacity="0.6"/>
    <polygon points="152,18 160,22 152,26" fill="#fbbf24" opacity="0.6"/>

    <!-- Audio icon -->
    <rect x="164" y="0" width="44" height="44" rx="8" fill="none" stroke="#fbbf24" stroke-width="1.5" opacity="0.8"/>
    <text x="186" y="28" font-family="system-ui" font-size="18" fill="#fbbf24" text-anchor="middle" opacity="0.9">TTS</text>
  </g>

  <!-- Version badge -->
  <rect x="700" y="12" width="55" height="22" rx="6" fill="#e8751a" opacity="0.15"/>
  <text x="727" y="27" font-family="system-ui" font-size="11" fill="#e8751a" text-anchor="middle" font-weight="600">v0.4.1</text>
</svg>
